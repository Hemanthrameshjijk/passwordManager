<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #161d2f;
      --accent: #6366f1;
      --text: #f1f5f9;
      --text-muted: #64748b;
      --border: #1e293b;
    }
    body {
      width: 320px;
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    .header {
      padding: 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 1.2rem; }
    .title { font-weight: 700; font-size: 0.9rem; }
    
    .content { padding: 16px; }
    
    .view { display: none; }
    .view.active { display: block; }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; }
    input, select {
      width: 100%;
      padding: 10px;
      background: #0d1220;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 0.85rem;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    
    .credential-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .credential-item {
      padding: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .credential-item:hover { border-color: var(--accent); }
    .item-domain { font-weight: 600; font-size: 0.85rem; margin-bottom: 2px; }
    .item-user { font-size: 0.75rem; color: var(--text-muted); }
    
    .status-bar {
      padding: 8px 16px;
      background: #0d1220;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔐</div>
    <div class="title">Zero-Knowledge Vault</div>
  </div>

  <div class="content">
    <!-- Login View -->
    <div id="view-login" class="view active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button id="btn-login">Sign In</button>
    </div>

    <!-- Vault View -->
    <div id="view-vault" class="view">
      <div class="form-group">
        <label>Active Project</label>
        <select id="project-select">
          <option value="null">🔓 My Private Vault</option>
        </select>
      </div>
      
      <div id="list-credentials" class="credential-list">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status-user">Not logged in</span>
    <span id="btn-logout" style="cursor:pointer; display:none;">Logout</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
